version: 1
disable_existing_loggers: False
formatters:
  standard:
    format: "(%(asctime)s) - [%(name)s|%(levelname)s]: %(message)s"
    datefmt: '%d.%m %H:%M:%S'
  colored:
    (): colorlog.ColoredFormatter
    format: "%(log_color)s (%(asctime)s) - [%(name)s|%(levelname)s]: %(message)s"
    datefmt: '%H:%M:%S'
    log_colors:
      DEBUG: "green"
      INFO: "purple"
      WARNING: "bold_cyan"
      ERROR: "bold_red"
      CRITICAL: "bold_red"
handlers:
  console:
    class: logging.StreamHandler
    level: INFO  # this sets the console logging level
    formatter: colored
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: INFO
    formatter: standard
    filename:
    mode: a  # append mode

loggers:
  aktiRBD:
    level: INFO
    handlers: [console, file]
    propagate: False
root:
  level: INFO
  handlers: [console, file]